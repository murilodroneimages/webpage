<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastrar Usuário | Lojabot SaaS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased min-h-screen flex flex-col justify-center py-10 sm:px-6 lg:px-8">

  <div class="sm:mx-auto sm:w-full sm:max-w-md">
    <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900">
      Crie sua conta
    </h2>
    <p class="mt-2 text-center text-sm text-gray-600">
      Comece a automatizar suas vendas no WhatsApp
    </p>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
    <div class="bg-white py-8 px-4 shadow sm:rounded-lg sm:px-10 border border-gray-100">
      
      <div id="alertBox" class="hidden mb-4 p-4 rounded-md text-sm" role="alert">
        <span id="alertMessage"></span>
      </div>

      <form id="userForm" class="space-y-5">
        <div>
          <label for="name" class="block text-sm font-medium text-gray-700">Nome da Loja / Responsável</label>
          <div class="mt-1">
            <input id="name" name="name" type="text" required 
              class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm" 
              placeholder="Ex: Padaria do João">
          </div>
        </div>

        <div>
          <label for="email" class="block text-sm font-medium text-gray-700">E-mail</label>
          <div class="mt-1">
            <input id="email" name="email" type="email" required 
              class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm" 
              placeholder="contato@loja.com.br">
          </div>
        </div>

        <div>
          <label for="whatsapp" class="block text-sm font-medium text-gray-700">WhatsApp (com DDD)</label>
          <div class="mt-1">
            <input id="whatsapp" name="whatsapp" type="tel" required 
              class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm" 
              placeholder="5541999999999">
          </div>
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-700">Senha</label>
          <div class="mt-1">
            <input id="password" name="password" type="password" required 
              class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm" 
              placeholder="••••••••
