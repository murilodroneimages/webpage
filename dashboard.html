<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel | Lojabot SaaS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    .sidebar-transition { transition: width 0.3s ease-in-out; }
    .fade-in { animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-gray-100 font-sans antialiased flex h-screen overflow-hidden">

  <aside id="sidebar" class="bg-gray-900 text-white w-64 flex-shrink-0 flex flex-col sidebar-transition z-20 relative">
    <div class="h-16 flex items-center justify-between px-4 border-b border-gray-800">
      <div class="flex items-center gap-2 overflow-hidden">
        <i class="ph-fill ph-robot text-3xl text-blue-500 flex-shrink-0"></i>
        <span id="logo-text" class="font-bold text-xl whitespace-nowrap">Lojabot</span>
      </div>
      <button id="toggleSidebar" class="text-gray-400 hover:text-white p-1 rounded-md bg-gray-800 hover:bg-gray-700">
        <i id="toggle-icon" class="ph ph-caret-left"></i>
      </button>
    </div>

    <nav class="flex-1 overflow-y-auto py-4 px-2 space-y-1">
      <button id="menu-home" onclick="navigateTo('home')" class="nav-btn w-full flex items-center gap-3 px-3 py-2 rounded-md hover:bg-gray-800 text-gray-300 transition-colors">
        <i class="ph ph-house text-xl flex-shrink-0"></i>
        <span class="sidebar-text whitespace-nowrap">Início</span>
      </button>

      <button id="menu-connection" onclick="navigateTo('connection')" class="nav-btn w-full flex items-center gap-3 px-3 py-2 rounded-md hover:bg-gray-800 text-gray-300 transition-colors">
        <i class="ph ph-plugs-connected text-xl flex-shrink-0"></i>
        <span class="sidebar-text whitespace-nowrap">Conexão</span>
      </button>
      
      <button id="menu-agent" onclick="navigateTo('agent')" class="nav-btn w-full flex items-center gap-3 px-3 py-2 rounded-md hover:bg-gray-800 text-gray-300 transition-colors">
        <i class="ph ph-brain text-xl flex-shrink-0"></i>
        <span class="sidebar-text whitespace-nowrap">Agente de IA</span>
      </button>

      <button id="menu-catalog" onclick="navigateTo('catalog')" class="nav-btn w-full flex items-center gap-3 px-3 py-2 rounded-md hover:bg-gray-800 text-gray-300 transition-colors">
        <i class="ph ph-package text-xl flex-shrink-0"></i>
        <span class="sidebar-text whitespace-nowrap">Catálogo</span>
      </button>
    </nav>

    <div class="p-4 border-t border-gray-800">
      <button onclick="logout()" class="w-full flex items-center gap-3 px-3 py-2 rounded-md text-red-400 hover:bg-gray-800 hover:text-red-300">
        <i class="ph ph-sign-out text-xl flex-shrink-0"></i>
        <span class="sidebar-text whitespace-nowrap">Sair</span>
      </button>
    </div>
  </aside>

  <div class="flex-1 flex flex-col overflow-hidden bg-gray-50 relative">
    <header class="h-16 bg-white shadow-sm flex items-center justify-between px-6 z-10">
      <h1 id="page-title" class="text-xl font-semibold text-gray-800">Início</h1>
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 font-bold">
          <i class="ph ph-storefront"></i>
        </div>
        <span id="tenant-name" class="text-sm font-medium text-gray-700 hidden sm:block">Carregando...</span>
      </div>
    </header>

    <main id="app-content" class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-50 p-6 fade-in">
       </main>
  </div>

  <script src="/webpage/js/router.js"></script>
  <script src="/webpage/js/controllers/agentController.js"></script>
  <script src="/webpage/js/controllers/connectionController.js"></script>
  <script src="/webpage/js/controllers/catalogController.js"></script>
  
  <script>
    // Segurança e Setup Básico
    const sessionStr = localStorage.getItem('lojabot_session');
    const tenantStr = localStorage.getItem('lojabot_tenant');
    if (!sessionStr || !tenantStr) window.location.href = '/webpage/login.html';

    const tenant = JSON.parse(tenantStr);
    document.getElementById('tenant-name').textContent = tenant.name;

    function logout() {
      localStorage.clear();
      window.location.href = '/webpage/login.html';
    }

    // Lógica visual do Sidebar Retrátil
    let sidebarOpen = true;
    document.getElementById('toggleSidebar').addEventListener('click', () => {
      const sidebar = document.getElementById('sidebar');
      const texts = document.querySelectorAll('.sidebar-text');
      const logoText = document.getElementById('logo-text');
      const icon = document.getElementById('toggle-icon');

      sidebarOpen = !sidebarOpen;
      if (sidebarOpen) {
        sidebar.classList.replace('w-20', 'w-64');
        setTimeout(() => { texts.forEach(t => t.classList.remove('hidden')); logoText.classList.remove('hidden'); }, 150);
        icon.className = 'ph ph-caret-left';
      } else {
        sidebar.classList.replace('w-64', 'w-20');
        texts.forEach(t => t.classList.add('hidden'));
        logoText.classList.add('hidden');
        icon.className = 'ph ph-list';
      }
    });
  </script>
</body>
</html>
