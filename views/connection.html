<div class="fade-in h-full flex flex-col items-center justify-center">
  <div class="mb-8 w-full max-w-md text-center">
    <h2 class="text-3xl font-bold text-gray-800 mb-2">Conexão com WhatsApp</h2>
    <p class="text-sm text-gray-500">Vincule o aparelho da sua empresa.</p>
  </div>

  <div id="qr-container" class="bg-white shadow-xl rounded-2xl border border-gray-100 p-8 flex flex-col items-center max-w-md w-full">
    <h3 class="text-lg font-semibold text-gray-800 mb-4" id="connection-title">Conectando ao servidor...</h3>
    
    <div class="bg-gray-50 p-4 rounded-xl border border-gray-200 h-64 w-64 flex items-center justify-center relative">
      <div id="qr-loader" class="absolute flex flex-col items-center justify-center">
         <i class="ph ph-spinner-gap animate-spin text-4xl text-blue-500"></i>
      </div>
      <img id="qr-image" class="hidden w-full h-full object-contain" alt="Scan QR Code" />
    </div>

    <p class="text-sm text-gray-500 mt-6 text-center">Abra o WhatsApp > Aparelhos Conectados > Conectar Aparelho.</p>
  </div>

  <div id="connected-container" class="hidden bg-white shadow-xl border-t-4 border-green-500 rounded-2xl p-8 flex flex-col items-center max-w-md w-full">
    <i class="ph-fill ph-check-circle text-6xl text-green-500 mb-4"></i>
    <h3 class="text-2xl font-bold text-gray-900 mb-2">Conectado!</h3>
    
    <div class="w-full bg-gray-50 rounded-lg p-4 mt-4 space-y-2">
      <div class="flex justify-between border-b border-gray-200 pb-2">
        <span class="text-sm text-gray-500">Número:</span>
        <span class="text-sm font-semibold text-gray-800" id="connected-number">--</span>
      </div>
      <div class="flex justify-between pt-2">
        <span class="text-sm text-gray-500">Sessão iniciada:</span>
        <span class="text-sm font-semibold text-gray-800" id="connected-time">--</span>
      </div>
    </div>
  </div>
</div>
