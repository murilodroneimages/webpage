<div class="fade-in h-full flex flex-col">
  
  <div class="flex justify-between items-center mb-6">
    <div>
      <h2 class="text-2xl font-bold text-gray-800">Catálogo e Estoque</h2>
      <p class="text-sm text-gray-500">Gerencie os produtos que a Inteligência Artificial poderá vender.</p>
    </div>
    <button onclick="CatalogController.openModal()" class="flex items-center gap-2 py-2 px-4 rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 transition-colors">
      <i class="ph ph-plus-circle text-lg"></i> Novo Produto
    </button>
  </div>

  <div id="catalogAlertBox" class="hidden mb-4 p-4 text-sm rounded-md flex items-center gap-2">
    <i id="catalogAlertIcon" class="ph text-lg"></i>
    <span id="catalogAlertMessage"></span>
  </div>

  <div class="bg-white shadow rounded-lg border border-gray-200 flex-1 overflow-hidden">
    <div class="overflow-x-auto">
      <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
          <tr>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Produto / SKU</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Preço (R$)</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Estoque</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
            <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">Ações</th>
          </tr>
        </thead>
        <tbody id="catalogTableBody" class="bg-white divide-y divide-gray-200">
          <tr><td colspan="5" class="px-6 py-10 text-center text-gray-500"><i class="ph ph-spinner animate-spin text-2xl mb-2"></i><br>Carregando catálogo...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div id="catalogModal" class="fixed inset-0 z-50 hidden" aria-modal="true">
    <div class="fixed inset-0 bg-gray-900 bg-opacity-75 transition-opacity"></div>
    <div class="fixed inset-0 z-10 w-screen overflow-y-auto">
      <div class="flex min-h-full items-end justify-center p-4 text-center sm:items-center sm:p-0">
        <div class="relative transform overflow-hidden rounded-lg bg-white text-left shadow-xl transition-all sm:my-8 sm:w-full sm:max-w-2xl">
          
          <div class="px-6 py-4 border-b border-gray-200 flex justify-between items-center bg-gray-50">
            <h3 class="text-lg font-semibold text-gray-900" id="catalogModalTitle">Novo Produto</h3>
            <button onclick="CatalogController.closeModal()" class="text-gray-400 hover:text-gray-600"><i class="ph ph-x text-xl"></i></button>
          </div>

          <form id="catalogForm" class="px-6 py-5 space-y-4 bg-white">
            <input type="hidden" id="prod_id">

            <div class="flex items-center justify-between bg-gray-50 p-3 rounded border border-gray-200">
              <span class="text-sm font-medium text-gray-800">Produto Ativo (Visível para a IA)?</span>
              <input type="checkbox" id="prod_disponivel" checked class="h-5 w-5 text-blue-600 focus:ring-blue-500 border-gray-300 rounded cursor-pointer">
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
              <div class="sm:col-span-2">
                <label class="block text-sm font-medium text-gray-700">Nome do Produto</label>
                <input type="text" id="prod_nome" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-blue-500 sm:text-sm">
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700">Cód. SKU</label>
                <input type="text" id="prod_sku" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-blue-500 sm:text-sm" placeholder="Ex: BOL-01">
              </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-medium text-gray-700">Preço Unitário (R$)</label>
                <input type="number" step="0.01" id="prod_valor" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-blue-500 sm:text-sm">
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700">Quantidade Estoque</label>
                <input type="number" id="prod_qtd" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-blue-500 sm:text-sm">
              </div>
            </div>

            <div>
              <label class="block text-sm font-medium text-gray-700">Descrição (Para a IA entender o produto)</label>
              <textarea id="prod_descricao" rows="3" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-blue-500 sm:text-sm"></textarea>
            </div>

            <div>
              <label class="block text-sm font-medium text-gray-700">URL da Imagem (Opcional)</label>
              <input type="url" id="prod_imagem" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-blue-500 sm:text-sm" placeholder="https://site.com/foto.jpg">
            </div>

            <div id="catalogModalAlert" class="hidden text-sm text-red-600 bg-red-50 p-3 rounded"></div>

            <div class="flex justify-end gap-3 pt-4 border-t border-gray-100">
              <button type="button" onclick="CatalogController.closeModal()" class="py-2 px-4 border border-gray-300 rounded-md text-sm font-medium text-gray-700 bg-white hover:bg-gray-50">Cancelar</button>
              <button type="submit" id="saveCatalogBtn" class="flex items-center gap-2 py-2 px-4 border border-transparent rounded-md text-sm font-medium text-white bg-blue-600 hover:bg-blue-700">
                <i class="ph ph-floppy-disk text-lg"></i> Salvar
              </button>
            </div>
          </form>

        </div>
      </div>
    </div>
  </div>
</div>
