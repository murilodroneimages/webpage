<div class="fade-in h-full flex flex-col">
  
  <div class="flex justify-between items-center mb-6">
    <div>
      <h2 class="text-2xl font-bold text-gray-800">Instruções do Agente</h2>
      <p class="text-sm text-gray-500">Gerencie as personalidades e regras da sua Inteligência Artificial.</p>
    </div>
    <button onclick="AgentController.openModal()" class="flex items-center gap-2 py-2 px-4 rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 transition-colors">
      <i class="ph ph-plus-circle text-lg"></i> Novo Agente
    </button>
  </div>

  <div id="mainAlertBox" class="hidden mb-4 p-4 text-sm rounded-md flex items-center gap-2">
    <i id="mainAlertIcon" class="ph text-lg"></i>
    <span id="mainAlertMessage"></span>
  </div>

  <div class="bg-white shadow rounded-lg border border-gray-200 flex-1 overflow-hidden">
    <div class="overflow-x-auto">
      <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
          <tr>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Nome do Agente</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Atualizado em</th>
            <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Ações</th>
          </tr>
        </thead>
        <tbody id="agentTableBody" class="bg-white divide-y divide-gray-200">
          <tr>
            <td colspan="4" class="px-6 py-10 text-center text-gray-500">
              <i class="ph ph-spinner animate-spin text-2xl mb-2"></i><br>Carregando agentes...
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div id="agentModal" class="fixed inset-0 z-50 hidden" aria-labelledby="modal-title" role="dialog" aria-modal="true">
    <div class="fixed inset-0 bg-gray-900 bg-opacity-75 transition-opacity" aria-hidden="true"></div>

    <div class="fixed inset-0 z-10 w-screen overflow-y-auto">
      <div class="flex min-h-full items-end justify-center p-4 text-center sm:items-center sm:p-0">
        
        <div class="relative transform overflow-hidden rounded-lg bg-white text-left shadow-xl transition-all sm:my-8 sm:w-full sm:max-w-2xl">
          
          <div class="px-6 py-4 border-b border-gray-200 flex justify-between items-center bg-gray-50">
            <h3 class="text-lg font-semibold text-gray-900" id="modalTitle">Cadastrar Novo Agente</h3>
            <button onclick="AgentController.closeModal()" class="text-gray-400 hover:text-gray-600">
              <i class="ph ph-x text-xl"></i>
            </button>
          </div>

          <form id="agentForm" class="px-6 py-5 space-y-5 bg-white">
            <input type="hidden" id="agent_id">

            <div class="flex items-center justify-between bg-blue-50 p-3 rounded border border-blue-100">
              <span class="text-sm font-medium text-gray-800">Status da Instrução</span>
              <div class="flex items-center gap-2">
                <span class="text-sm font-semibold text-blue-700" id="status-text">Habilitado</span>
                <button type="button" id="toggle-bot" class="bg-blue-600 relative inline-flex flex-shrink-0 h-6 w-11 border-2 border-transparent rounded-full cursor-pointer transition-colors ease-in-out duration-200 focus:outline-none">
                  <span id="toggle-knob" class="translate-x-5 pointer-events-none inline-block h-5 w-5 rounded-full bg-white shadow transform ring-0 transition ease-in-out duration-200"></span>
                </button>
              </div>
            </div>

            <div>
              <label for="nome_agente" class="block text-sm font-medium text-gray-700">Nome do Atendente</label>
              <input type="text" id="nome_agente" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-blue-500 sm:text-sm" placeholder="Ex: Júlia da Padaria">
            </div>
            
            <div>
              <label for="instrucao_agente" class="block text-sm font-medium text-gray-700">Instruções de Comportamento (Prompt)</label>
              <textarea id="instrucao_agente" rows="6" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-blue-500 sm:text-sm" placeholder="Aja como uma atendente simpática..."></textarea>
            </div>

            <div id="modalAlert" class="hidden text-sm text-red-600 bg-red-50 p-3 rounded"></div>

            <div class="flex justify-end gap-3 pt-4 border-t border-gray-100">
              <button type="button" onclick="AgentController.closeModal()" class="py-2 px-4 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 transition-colors">
                Cancelar
              </button>
              <button type="button" onclick="AgentController.clearForm()" class="py-2 px-4 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 transition-colors">
                Limpar
              </button>
              <button type="submit" id="saveAgentBtn" class="flex items-center gap-2 py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 transition-colors">
                <i class="ph ph-floppy-disk text-lg"></i> Salvar
              </button>
            </div>
          </form>

        </div>
      </div>
    </div>
  </div>
</div>
