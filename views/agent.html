<div class="max-w-3xl bg-white shadow rounded-lg border border-gray-100 fade-in">
  <div class="px-6 py-5 border-b border-gray-200 flex justify-between items-center">
    <div>
      <h3 class="text-lg leading-6 font-medium text-gray-900">Personalidade do Atendente</h3>
      <p class="mt-1 text-sm text-gray-500">Defina como a inteligência artificial deve conversar com seus clientes.</p>
    </div>
    <div class="flex items-center">
      <span class="mr-3 text-sm font-medium text-gray-900" id="status-text">Bot Ativado</span>
      <button type="button" id="toggle-bot" class="bg-blue-600 relative inline-flex flex-shrink-0 h-6 w-11 border-2 border-transparent rounded-full cursor-pointer transition-colors ease-in-out duration-200 focus:outline-none">
        <span id="toggle-knob" class="translate-x-5 pointer-events-none inline-block h-5 w-5 rounded-full bg-white shadow transform ring-0 transition ease-in-out duration-200"></span>
      </button>
    </div>
  </div>

  <div id="agentAlertBox" class="hidden p-4 text-sm mx-6 mt-4 rounded-md flex items-center gap-2">
    <i id="agentAlertIcon" class="ph text-lg"></i>
    <span id="agentAlertMessage"></span>
  </div>

  <form id="agentForm" class="px-6 py-5 space-y-6">
    <div>
      <label for="nome_agente" class="block text-sm font-medium text-gray-700">Nome do Atendente Virtual</label>
      <input type="text" id="nome_agente" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-blue-500 sm:text-sm">
    </div>
    <div>
      <label for="instrucao_agente" class="block text-sm font-medium text-gray-700">Instruções de Comportamento (Prompt)</label>
      <textarea id="instrucao_agente" rows="8" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-blue-500 sm:text-sm"></textarea>
    </div>
    <div class="flex justify-end pt-4 border-t border-gray-100">
      <button type="submit" id="saveAgentBtn" class="flex items-center gap-2 py-2 px-4 rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 transition-colors">
        <i class="ph ph-floppy-disk text-lg"></i> Salvar Configurações
      </button>
    </div>
  </form>
</div>
